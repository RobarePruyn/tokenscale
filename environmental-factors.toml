# ----------------------------------------------------------------------------
# [grid_factors.<region>]
# ----------------------------------------------------------------------------
# Per-region facility-level factors. Indexed by AWS region identifier.
# These are the multipliers applied AFTER per-token energy is computed:
#
#   facility_wh = energy_wh * pue
#   co2e_g      = facility_wh/1000 * co2e_kg_per_kwh * 1000
#   water_l     = facility_wh/1000 * water_l_per_kwh
#
# Region attribution is configured by the user (config.default_inference_region),
# not observed from request metadata.
# ----------------------------------------------------------------------------

[grid_factors."us-east-1"]
display_name = "AWS US East (N. Virginia)"
valid_from = "2026-04-28"
co2e_kg_per_kwh = null         # UNKNOWN — populated from EPA eGRID2023rev2 (subregion SRVC, RFCE)
water_l_per_kwh = null         # UNKNOWN — populated from AWS-disclosed WUE
pue = null                     # UNKNOWN — fallback to AWS global PUE 1.15 if region-specific not disclosed
source_url_co2e = "https://www.epa.gov/egrid"
source_url_water = "https://aws.amazon.com/sustainability/data-centers/"
source_url_pue = "https://aws.amazon.com/sustainability/data-centers/"
source_accessed_at = "2026-04-28"
notes = "Placeholder — production values pending Cowork deliverable 3 merge."

