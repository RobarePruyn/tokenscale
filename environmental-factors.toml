# ============================================================================
# GOOGLE
# ============================================================================
# Anchor: Elsworth et al. (Google), arXiv:2508.15734 (2025-08-21)
# https://arxiv.org/abs/2508.15734
# Reports MEDIAN GEMINI APPS TEXT PROMPT (comprehensive methodology):
#   - 0.24 Wh energy
#   - 0.03 gCO2e (using Google's 2024 fleetwide average grid carbon intensity)
#   - 0.26 mL water
# Methodology covers: active accelerator power + host CPU/RAM + idle capacity
# + PUE-weighted overhead. Google's fleetwide PUE is 1.09.
#
# IMPORTANT METHODOLOGY NOTE: Google publishes per-PROMPT, not per-TOKEN.
# Converting requires assuming a token count for the median prompt. We use
# 1,500 tokens (input+output combined) as a working assumption for the
# "median Gemini Apps text prompt" — this is consistent with Couch's analysis
# and with general median-prompt sizing in the literature. This assumption
# carries ±50% uncertainty and propagates into all per-token Gemini values.

[providers.google]
display_name = "Google"
inference_provider = "google_cloud"  # Google's own infrastructure (TPUs)
disclosure_status = "vendor_disclosed_per_prompt"
disclosure_status_source = "https://arxiv.org/abs/2508.15734"
disclosure_status_accessed = "2026-04-28"

[providers.google.models."gemini-apps-median-text"]
display_name = "Gemini Apps median text prompt (composite)"
released_at = "2025-05-01"  # data window for Google's analysis (approximate)
valid_from = "2025-05-01"
source_doc = "docs/sources.md#B.1.1"
confidence = "primary"
notes = "ANCHOR: Google's August 2025 disclosure. 0.24 Wh per median text prompt (comprehensive methodology). Per-token derivation assumes 1,500-token median prompt. Google's analysis combines all Gemini Apps text serving — does not break out by Gemini Pro vs Flash vs Flash-Lite individually. Google does not provide per-token rates. Per-token Wh values below assume 1,500 total tokens, apportioned 60% input / 40% output (typical for chat-style Apps usage)."
wh_per_mtok_input = 96              # 0.24 Wh × 0.6 input share / 1500 tokens × 1e6 = 96 Wh/MTok
wh_per_mtok_output = 256            # 0.24 Wh × 0.4 output share / 1500 tokens × 1e6 / (output 2.67x input) = derived
                                    # Working: per-token energy approximated as input=0.000096 Wh, output=0.000256 Wh (output is ~2.67x input rate per typical assumption)
wh_per_mtok_cache_read = null       # UNKNOWN — Google does not break out cache pricing/energy in disclosure
wh_per_mtok_cache_write_5m = null   # UNKNOWN
wh_per_mtok_cache_write_1h = null   # UNKNOWN
uncertainty_range_pct = 50          # Token-count assumption alone is ±50%; underlying value is ±10% per Google's methodology paper

