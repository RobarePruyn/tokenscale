[defaults]
fallback_pue = 1.15
fallback_pue_source = "https://aws.amazon.com/sustainability/data-centers/"
fallback_pue_accessed = "2026-04-28"
fallback_wue_l_per_kwh = 0.15
fallback_wue_source = "https://aws.amazon.com/sustainability/data-centers/"
fallback_wue_accessed = "2026-04-28"
methodology = "google-comprehensive-aug-2025"
methodology_source = "https://arxiv.org/abs/2508.15734"
methodology_summary = "Energy includes active accelerator + host CPU/RAM + idle capacity + PUE-weighted facility overhead. Carbon = facility energy × grid CO2e intensity for the configured region. Water = facility energy × WUE for the configured region. Per-token rates anchor on either (a) measured per-prompt rates with assumed token counts, (b) third-party benchmarks (Jegham et al. v6), or (c) extrapolations from measured predecessors with documented relative-efficiency adjustments. Every value carries an uncertainty_range_pct."
median_prompt_token_count_assumption = 1500   # used to convert per-prompt to per-MTok for Google and OpenAI median anchors
long_prompt_token_count_assumption = 10300    # used to convert Jegham per-long-prompt values to per-MTok
input_output_ratio_chat = 0.6                 # 60/40 for typical chat-style apps usage
input_output_ratio_long_prompt = 0.4          # 40/60 for Jegham's "long prompt" definition (input-heavy but output substantial)
input_output_ratio_reasoning = 0.3            # 30/70 for reasoning models like o3 (output-dominant due to internal CoT)
output_to_input_energy_ratio = 4              # output tokens cost ~4-5x input tokens in compute energy (Couch + general LLM serving cost knowledge)
