# tokenscale environmental factors
# Schema version: 1
# All values reflect public sources as of the dates noted inline.
# Updates flow through the proposals/ directory in the Cowork project,
# are reviewed by the maintainer, and are merged into the Git repo.

# ============================================================================
# v0.1 PRODUCTION FILE — first values bundle.
# ============================================================================
# Coverage: Anthropic (4.5/4.6/4.7 generations + Haiku 4.5), Google Gemini,
#           OpenAI (GPT-4o, GPT-5, o3), DeepSeek-R1, Meta LLaMA family,
#           Mistral Le Chat. AWS subregions (us-east-1, us-east-2, us-west-2)
#           with EPA eGRID2023 grid carbon intensity and AWS-disclosed WUE.
#
# Methodology: Per-token energy, with PUE/WUE/grid-CO2e applied as facility
#              multipliers downstream. Adopts Google's "comprehensive
#              methodology" (Elsworth et al. 2025, arXiv:2508.15734) — energy
#              includes active accelerator + host CPU/RAM + idle capacity +
#              PUE-weighted overhead.
#
# Anchored vs. estimated: Each value is tagged inline. Anchored values trace
# to a specific URL, peer-reviewed paper, or first-party disclosure. Estimated
# values show their derivation from a measured predecessor or published
# relative-efficiency claim, with a confidence range. Genuinely unknown values
# are null with a comment indicating what's needed to populate them.
# ============================================================================

schema_version = 1
file_status = "production"
file_version = "0.2"
file_published = "2026-05-12"
methodology = "google-comprehensive-aug-2025"
methodology_source = "https://arxiv.org/abs/2508.15734"

# ----------------------------------------------------------------------------
# [providers.<provider>]
# ----------------------------------------------------------------------------
# Each provider block carries an `inference_provider` indicating the cloud
# infrastructure hosting inference (relevant for grid_factors join).
# ----------------------------------------------------------------------------

# ============================================================================
# ANTHROPIC
# ============================================================================
# Anchor data: Couch (2026-01-20), https://simonpcouch.com/blog/2026-01-20-cc-impact/
# Couch derived per-token rates by scaling Google's 0.24 Wh median Gemini prompt
# anchor through Claude Code session token counts. His blog provides:
#   - 4.5-class Sonnet/Opus blended: ~390 Wh/MTok input, ~1950 Wh/MTok output
#   - Smaller-class blended: ~200 Wh/MTok input, ~990 Wh/MTok output
#   - Cache reads: priced (and roughly compute-cost) at ~1/10 of input
# Anthropic itself has disclosed NO per-query, per-token, or per-model
# environmental data (verified 2026-04-28 against
# https://www.anthropic.com/transparency/voluntary-commitments).

[providers.anthropic]
display_name = "Anthropic"
inference_provider = "aws"
disclosure_status = "not_disclosed"  # Anthropic does not publish per-query environmental data
disclosure_status_source = "https://www.anthropic.com/transparency/voluntary-commitments"
disclosure_status_accessed = "2026-04-28"

