# ============================================================================
# GRID FACTORS (per region)
# ============================================================================
# CO2e values: EPA eGRID2023 (released 2025-09-29), summary tables PDF
# https://www.epa.gov/system/files/documents/2025-06/summary_tables_rev2.pdf
# Subregion-level annual CO2e output emission rates, converted lb/MWh → kg/kWh
# at 0.4536 kg/lb. State-level values noted as a cross-reference.
#
# WUE values: AWS published a global 2024 figure of 0.15 L/kWh at
# https://aws.amazon.com/sustainability/data-centers/. AWS does NOT publish
# per-region WUE. We apply 0.15 L/kWh uniformly with a # UNKNOWN flag for
# region-specific values; next research cycle should check for updates.
#
# PUE values: AWS global 2024 PUE is 1.15. AWS publishes region best-case
# (Americas best site 1.05, APAC 1.07) but not per-region averages. We use
# 1.15 as the conservative default for all regions, with a note.

[grid_factors."us-east-1"]
display_name = "AWS US East (N. Virginia)"
valid_from = "2023-01-01"  # eGRID2023 covers calendar year 2023; this row is the v0.1 best-effort applied retroactively to all events for which we don't have a finer-grained measurement.
egrid_subregion = "SRVC"
egrid_subregion_full_name = "SERC Virginia/Carolina"
egrid_subregion_co2e_lb_per_mwh = 596.3   # ANCHOR: eGRID2023 summary tables, page 2
co2e_kg_per_kwh = 0.270              # ANCHOR: 596.3 × 0.4536 / 1000 = 0.2705
co2e_uncertainty_range_pct = 15      # Sweep #1 (2026-05-12): SRVC observed range 13.0% across eGRID 2019/2020/2022/2023 (range 596-679 lb/MWh, std dev 4.7%). Rounded up for subregion-to-datacenter mix gap.
co2e_state_check_va_kg_per_kwh = 0.245   # cross-reference: VA state = 539.6 lb/MWh = 0.2448 kg/kWh; subregion is canonical
water_l_per_kwh = 0.15               # ANCHOR: AWS 2024 global WUE; per-region NOT disclosed
water_uncertainty_range_pct = 50     # AWS publishes global only; per-region real draw can vary substantially with climate. 50% is honest for a global-to-regional gap.
