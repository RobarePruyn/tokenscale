schema_version = 1
file_status = "placeholder"   # set to "production" when real v0.1 values are merged in

# ----------------------------------------------------------------------------
# [providers.<provider>.models.<model-id>]
# ----------------------------------------------------------------------------
# Each model block carries Wh-per-million-token (Wh/MTok) values for each
# token type the application tracks. Token types match the schema in events
# and env_factors:
#   - input
#   - output
#   - cache_read
#   - cache_write_5m
#   - cache_write_1h
#
# Where a value is genuinely unknown, leave it as null and add a comment
# explaining what we'd need to populate it. Where a value is an extrapolation
# from a measured predecessor or vendor relative-efficiency claim, prefix the
# comment with `# ESTIMATE:` and show the derivation.
#
# `valid_from` is the access date of the most recent source the value rests
# on, in ISO-8601. `source_doc` references either a docs/sources.md anchor
# (preferred) or a direct URL.
# ----------------------------------------------------------------------------

[providers.anthropic]
display_name = "Anthropic"
inference_provider = "aws"   # the cloud provider hosting inference; used to
                             # join against grid_factors for facility math

