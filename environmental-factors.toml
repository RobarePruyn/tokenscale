# ----------------------------------------------------------------------------
# [defaults]
# ----------------------------------------------------------------------------
# Application-wide defaults applied when a more specific value is unavailable.
# ----------------------------------------------------------------------------

[defaults]
fallback_pue = 1.15            # AWS global PUE 2024 — see https://aws.amazon.com/sustainability/data-centers/
                               # Used when a region's pue value is null.
methodology = "google-comprehensive-aug-2025"
                               # Reference methodology: include active model compute, idle machines,
                               # host CPU/RAM, and PUE-weighted facility overhead. See:
                               # https://cloud.google.com/blog/products/infrastructure/measuring-the-environmental-impact-of-ai-inference/
